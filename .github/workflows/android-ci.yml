name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.5

      - name: Restore Gradle wrapper jar if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.14.5
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Commit restored wrapper jar
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain -- gradlew gradlew.bat gradle/wrapper)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add gradlew gradlew.bat gradle/wrapper
            git commit -m "Restore Gradle wrapper"
            git push
          fi
